<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <defs>
    <linearGradient id="f-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" /> <!-- emerald-500 -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- blue-500 -->
    </linearGradient>
  </defs>

  <!-- Circle background accent -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#10b981" stroke-width="2" opacity="0.3" />

  <!-- The "F" Icon -->
  <path d="M 35 25 L 75 25 C 85 25 85 40 75 40 L 45 40 L 45 55 L 65 55 C 75 55 75 70 65 70 L 45 70 L 45 85 L 30 85 Z" fill="url(#f-gradient)" />
  
  <!-- Mini Bar Chart -->
  <rect x="70" y="65" width="6" height="20" rx="2" fill="#3b82f6" />
  <rect x="80" y="55" width="6" height="30" rx="2" fill="#60a5fa" />
  <rect x="90" y="45" width="6" height="40" rx="2" fill="#93c5fd" />

  <!-- Circuit Lines -->
  <path d="M 80 30 L 95 30 L 105 20" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="105" cy="20" r="2" fill="#10b981" />
  
  <path d="M 75 45 L 90 45 L 100 55" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="100" cy="55" r="2" fill="#3b82f6" />

  <!-- Text "FinanceAI" -->
  <text x="120" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#ffffff" letter-spacing="-1">
    Finance<tspan fill="#10b981">AI</tspan>
  </text>
</svg>
